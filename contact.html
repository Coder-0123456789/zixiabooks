<!DOCTYPE html>
<html lang="en">
<head>
    <title>Contact</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Basic SEO -->
    <meta name="description" content="Zixia Jiang's website">
    <meta name="author" content="Zixia Jiang">
    <meta name="robots" content="index, follow">

    <!-- Theme color for mobile browsers -->
    <meta name="theme-color" content="#87CEEB">

    <!-- Open Graph (social media previews) -->
    <meta property="og:title" content="My Website">
    <meta property="og:description" content="Zixia Jiang's website: Home">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://zixiabooks.org">
    <meta property="og:image" content="https://zixiabooks.org/about_me_photo.png">

    <!-- Twitter card preview -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="My Website">
    <meta name="twitter:description" content="Zixia Jiang's website: Home">
    <meta name="twitter:image" content="https://zixiabooks.org/about_me_photo.png">

    <!-- PWA / mobile app behavior -->
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">
    <meta name="apple-mobile-web-app-title" content="Home">

    <!-- Prevent automatic phone/email detection on iOS -->
    <meta name="format-detection" content="telephone=no">
    <style>
        * {
            font-family: sans-serif;
            background-color: white;
            cursor: default;
        }

        #Topbar {
            border: 2px solid black;
            display: flex;
            justify-content: space-around;
            background-color: lightcyan;
        }

        .Topbar_items {
            margin: 5px;
        }

        #Switch-Language {
            background: transparent;
            border: none;
            padding: 0;
            color: blue;
            text-decoration: underline;
            cursor: default;
            font: inherit;
            font-size: 15px;
        }

        a:link, a:visited, a:hover, a:active {
            color: blue;
            cursor: default;
        }

        h1 {
            text-align: center !important;
        }

        /* Page content animation */
        .English-version, .Chinese-version {
            position: absolute;
            width: 100%;
            left: 0;
            top: 0;
            transition: opacity 0.4s ease, transform 0.4s ease;
        }

        .hidden {
            opacity: 0;
            transform: translateY(10px);
            pointer-events: none;
        }

        button {
            transition: 0.5s;
            transform-origin: top right;
        }

        a {
            background: transparent;
            transition: 0.5s;
            transform-origin: top right;
        }

        a:hover, button:hover {
            transform: rotate(3deg) scale(1.2);
            cursor: alias !important;
        }

        .content {
            position: relative;
            margin-top: 20px;
        }

        .fade {
            opacity: 0;
            transition: opacity 0.25s;
        }

        p {
            margin-left: 7%;
            margin-right: 7%;
            text-align: justify;
            font-size: x-large;
        }

        .main_container {
            display: grid;
            grid-template-areas:
            "header header header"
            "sidebar main main";
            grid-template-columns: 1fr 2fr 1fr;
        }

        #Topbar {grid-area: header;}
        #sidebar {grid-area: sidebar;}
        .content {grid-area: main;}

    </style>
</head>
<body>
<noscript><h1>Please enable JavaScript for this website to work.</h1></noscript>

<!-- Topbar (unchanged) -->
<header>
<div id="Topbar">
    <a href="home.html" class="Topbar_items">Home</a>
    <a href="About%20me.html" class="Topbar_items">About Me</a>
    <a href="books.html" class="Topbar_items">My Books</a>
    <a href="classes.html" class="Topbar_items">My Classes</a>
    <a href="resources.html" class="Topbar_items">Resources</a>
    <a href="contact.html" class="Topbar_items">Contact</a>
    <button id="Switch-Language">切换成汉语</button>
</div>
</header>
<div id="sidebar"></div>
<!-- Page content with language versions -->
<article>
<div class="content">
    <div class="Chinese-version">
        <h1>联系我</h1>
    </div>

    <div class="English-version">
        <h1>Contact</h1>
    </div>
</div>
</article>
<script>
    // Functions to show/hide content
    function hide_class(elements) {
        for (const el of elements) {
            el.classList.add('hidden');
        }
    }

    function show_class(elements) {
        for (const el of elements) {
            el.classList.remove('hidden');
        }
    }

    // Language switch function
    function switch_language() {
        switch_languageBTN.classList.add("fade");

        setTimeout(() => {
            if (current_language === "Chinese") {
                show_class(english_version);
                hide_class(chinese_version);
                current_language = "English";
                switch_languageBTN.textContent = "切换成汉语";
            } else {
                hide_class(english_version);
                show_class(chinese_version);
                current_language = "Chinese";
                switch_languageBTN.textContent = "Switch to English";
            }
            switch_languageBTN.classList.remove("fade");
        }, 250);
    }

    const switch_languageBTN = document.getElementById("Switch-Language");
    let current_language = "English";
    const english_version = document.getElementsByClassName("English-version");
    const chinese_version = document.getElementsByClassName("Chinese-version");

    // Hide Chinese content initially
    hide_class(chinese_version);

    switch_languageBTN.addEventListener("click", switch_language);

</script>
</body>
</html>
